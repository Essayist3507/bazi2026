<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子平八字 · 命理预测</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">子平八字</h1>
      <p class="subtitle">洞悉天机 · 知命改运 · 趋吉避凶</p>
    </header>

    <!-- Input Section -->
    <section class="input-section" id="inputSection">
      <div class="card">
        <div class="calendar-toggle">
          <button class="toggle-btn active" data-calendar="solar" id="btnSolar">公历（阳历）</button>
          <button class="toggle-btn" data-calendar="lunar" id="btnLunar">农历（阴历）</button>
        </div>

        <!-- Solar Calendar Inputs -->
        <div class="date-inputs" id="solarInputs">
          <div class="input-group">
            <label>出生年份</label>
            <input type="number" id="solarYear" placeholder="1990" min="1900" max="2100" value="1990">
          </div>
          <div class="input-group">
            <label>出生月份</label>
            <select id="solarMonth">
              <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
              <option value="4">4月</option><option value="5" selected>5月</option><option value="6">6月</option>
              <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
              <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
            </select>
          </div>
          <div class="input-group">
            <label>出生日期</label>
            <input type="number" id="solarDay" placeholder="20" min="1" max="31" value="20">
          </div>
        </div>

        <!-- Lunar Calendar Inputs -->
        <div class="date-inputs hidden" id="lunarInputs">
          <div class="input-group">
            <label>农历年份</label>
            <input type="number" id="lunarYear" placeholder="1990" min="1900" max="2100" value="1990">
          </div>
          <div class="input-group">
            <label>农历月份</label>
            <select id="lunarMonth"></select>
          </div>
          <div class="input-group">
            <label>农历日期</label>
            <select id="lunarDay"></select>
          </div>
          <div class="input-group" id="leapGroup" style="display:none">
            <label>闰月</label>
            <select id="lunarLeap">
              <option value="0">否</option>
              <option value="1">是（闰月）</option>
            </select>
          </div>
        </div>

        <!-- Birth Time & Gender -->
        <div class="input-row">
          <div class="input-group">
            <label>出生时辰</label>
            <select id="birthHour">
              <option value="0">子时 (23:00-01:00)</option>
              <option value="1">丑时 (01:00-03:00)</option>
              <option value="2">寅时 (03:00-05:00)</option>
              <option value="3">卯时 (05:00-07:00)</option>
              <option value="4">辰时 (07:00-09:00)</option>
              <option value="5">巳时 (09:00-11:00)</option>
              <option value="6">午时 (11:00-13:00)</option>
              <option value="7" selected>未时 (13:00-15:00)</option>
              <option value="8">申时 (15:00-17:00)</option>
              <option value="9">酉时 (17:00-19:00)</option>
              <option value="10">戌时 (19:00-21:00)</option>
              <option value="11">亥时 (21:00-23:00)</option>
            </select>
          </div>
          <div class="input-group">
            <label>性别</label>
            <div class="gender-toggle">
              <button class="toggle-btn active" data-gender="male" id="btnMale">男</button>
              <button class="toggle-btn" data-gender="female" id="btnFemale">女</button>
            </div>
          </div>
        </div>

        <button class="submit-btn" id="submitBtn">
          <span class="btn-text">推演命盘</span>
          <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Loading -->
    <div class="loading hidden" id="loading">
      <div class="yin-yang-spinner"></div>
      <p>推演天机中...</p>
    </div>

    <!-- Results Container -->
    <div class="results hidden" id="results">

      <!-- Four Pillars -->
      <section class="pillars-section">
        <h2 class="section-title">八字排盘</h2>
        <div class="pillars-grid" id="pillarsGrid"></div>
      </section>

      <!-- Five Elements Summary -->
      <section class="elements-section">
        <h2 class="section-title">五行分布</h2>
        <div class="elements-content" id="elementsContent"></div>
      </section>

      <!-- Ten Gods Summary -->
      <section class="gods-section">
        <h2 class="section-title">十神总览</h2>
        <div class="ten-gods-table" id="tenGodsTable"></div>
      </section>

      <!-- Shen Sha -->
      <section class="shensha-section">
        <h2 class="section-title">神煞</h2>
        <div class="shensha-grid" id="shenshaGrid"></div>
      </section>

      <!-- Da Yun -->
      <section class="dayun-section">
        <h2 class="section-title">大运流年</h2>
        <div class="dayun-info" id="dayunInfo"></div>
        <div class="dayun-timeline" id="dayunTimeline"></div>
      </section>

      <!-- Liu Nian -->
      <section class="liunian-section">
        <h2 class="section-title">流年分析</h2>
        <div class="liunian-content" id="liunianContent"></div>
      </section>

      <!-- Predictions -->
      <section class="predictions-section">
        <h2 class="section-title">命理预测</h2>
        <div class="pred-tabs" id="predTabs">
          <button class="pred-tab active" data-tab="yearly">逐年运势</button>
          <button class="pred-tab" data-tab="love">爱情姻缘</button>
          <button class="pred-tab" data-tab="wealth">财运事业</button>
          <button class="pred-tab" data-tab="health">健康平安</button>
          <button class="pred-tab" data-tab="caution">近期注意</button>
          <button class="pred-tab" data-tab="advice">当前建议</button>
        </div>
        <div class="pred-content" id="predContent"></div>
      </section>

      <!-- Edit Button -->
      <div class="edit-section">
        <button class="edit-btn" id="editBtn">重新输入</button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>命理之说，仅供参考。命运掌握在自己手中，愿君知命而不认命。</p>
      <p class="footer-disclaimer">本网站内容仅供娱乐参考，不构成任何人生决策建议。</p>
    </footer>
  </div>

  <script src="js/calendar.js"></script>
  <script src="js/bazi-core.js"></script>
  <script src="js/gods-stars.js"></script>
  <script src="js/dayun.js"></script>
  <script src="js/predictions.js"></script>
  <script src="js/deepseek.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
